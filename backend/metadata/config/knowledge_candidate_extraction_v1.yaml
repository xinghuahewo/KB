version: knowledge_candidate_extraction_v1
default_provider: disabled
providers:
  deterministic:
    model_revision: knowledge-term-rules-v1
    prompt_version: knowledge_candidate_deterministic_v1
    terms:
      - term: BGP
        entity_kind: protocol
        aliases:
          - Border Gateway Protocol
      - term: RPKI
        entity_kind: security_mechanism
        aliases:
          - Resource Public Key Infrastructure
      - term: ROA
        entity_kind: routing_object
        aliases:
          - Route Origin Authorization
  deepseek:
    api_key_env: DEEPSEEK_API_KEY
    model_revision: deepseek-chat
    prompt_version: knowledge_candidate_v1
inputs:
  evidence: data/derived/datasets/knowledge_candidate_evidence.jsonl
outputs:
  candidates: data/derived/governance/knowledge_candidates_v1.jsonl
  candidate_errors: data/derived/governance/knowledge_candidate_errors_v1.jsonl
  report: data/generated/reports/governance/knowledge_candidate_extraction_v1.json
  decisions: data/review_inputs/knowledge_candidate_decisions_v1.csv
  decision_audit: data/derived/governance/knowledge_candidate_decision_audit_v1.jsonl
  decision_audit_report: data/generated/reports/governance/knowledge_candidate_decision_audit_v1.json
  apply_preview: data/derived/governance/knowledge_candidate_apply_preview_v1.jsonl
  approved_candidates: data/derived/governance/approved_knowledge_candidates_v1.jsonl
  decision_apply_report: data/generated/reports/governance/knowledge_candidate_apply_v1.json
review_policy:
  allowed_decisions:
    - unreviewed
    - approved
    - rejected
    - needs_evidence
  conflict_rule: relation_subject_predicate_unique_object_v1
  write_requires_explicit_flag: true
