version: llm_candidate_enrichment_v1
default_provider: mock
providers:
  mock:
    enabled: true
    requires_network: false
    writes_raw_responses: false
  deepseek:
    enabled: false
    client_protocol: openai_compatible
    base_url: https://api.deepseek.com
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
  qwen_vllm:
    enabled: false
    client_protocol: openai_compatible
    base_url: http://localhost:8000/v1
    model: Qwen/Qwen3-8B
    api_key_env: LOCAL_LLM_API_KEY
safety:
  writes_primary_entities: false
  approves_entities: false
  generates_final_answers: false
  default_candidate_status: pending_review
generated_policy:
  chunk_candidates_path: data/derived/datasets/chunk_enrichment_candidates.jsonl
  entity_link_candidates_path: data/derived/datasets/entity_link_candidates.jsonl
