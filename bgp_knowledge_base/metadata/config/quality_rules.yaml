  - no_missing_source_ref
  - no_duplicate_entity_id
  - no_orphan_relationship
  - anomaly_type_must_have_evidence_template
  - data_source_must_have_limitations
  - case_must_have_event_type
  - case_must_have_time
  - case_must_have_source

