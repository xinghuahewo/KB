version: stage_acceptance_v1
generated_policy:
  report_path: reports/stage_acceptance_report.md
  results_path: datasets/stage_acceptance_results.jsonl
decision_values:
  - pass
  - fail
  - needs_human
stages:
  - id: phase_1_data_management_v1
    name: 数据管理体系 v1
    acceptance_mode: deterministic_with_effect_review
    required_files:
      - docs/governance/data_management_v1.md
      - config/data_management_capabilities.yaml
      - scripts/build_data_management_report.py
      - reports/data_management_report.md
      - tests/test_data_management_report.py
    commands:
      - id: data_management_report
        name: 生成数据管理能力报告
        command: python3 scripts/build_data_management_report.py
      - id: data_management_tests
        name: 数据管理体系测试
        command: python3 -m pytest tests/test_data_management_report.py -v
    report_checks:
      - id: data_management_report_summary
        path: reports/data_management_report.md
        must_contain:
          - "证据缺失数：0"
          - "## 数据资产清单"
          - "## 数据模型标准覆盖"
          - "## 元数据与溯源覆盖"
          - "## 质量治理能力"
          - "## 生命周期现状"
          - "## 服务化访问现状"
          - "## 标准化出口现状"
      - id: pipeline_report
        path: reports/pipeline_report.md
        must_contain:
          - "总体状态：通过"
          - "构建数据管理能力报告"
      - id: quality_report
        path: reports/quality_report.md
        must_contain:
          - "JSON 错误数：0"
          - "Schema 错误数：0"
          - "制品清单未登记文件数：0"
    effect_review:
      one_line: 当前 KB 已从文件与脚本集合升级为可盘点、可审计、可自动报告的数据资产体系。
      new_capabilities:
        - 建立了人读版数据管理体系说明，集中描述七大治理模块。
        - 建立了机器可读能力清单，登记 11 类数据资产和 7 类治理能力。
        - 建立了自动生成的数据管理能力报告，能显示资产状态、能力状态、证据覆盖和缺口。
        - 将数据管理报告纳入确定性流水线，后续流水线会同步更新治理视图。
      user_can_now:
        - 快速查看当前 KB 有哪些数据资产以及每类资产的路径和发布出口。
        - 通过报告判断哪些治理能力已完成、哪些仍是 partial 或 planned。
        - 用同一套配置持续登记新增资产、报告、服务接口和标准化出口。
      downstream_dependencies:
        - 阶段二可以基于资产清单补生命周期状态和统一元数据字段。
        - 阶段三可以基于治理能力清单增加语义质量规则。
        - RAG 和标准化阶段可以引用该清单判断哪些资产可进入检索和导出范围。
    human_review_policy:
      allow_needs_human: true
      non_blocking_items:
        - 案例语义字段仍需人工或语义流程复核。
        - PaperMethod 语义判断仍不能由确定性验收自动批准。
        - 生命周期模型尚未落地，进入阶段二处理。
  - id: phase_2_lifecycle_metadata_v1
    name: 生命周期与元数据治理 v1
    acceptance_mode: deterministic_with_effect_review
    required_files:
      - docs/governance/lifecycle_metadata_v1.md
      - config/lifecycle_policy.yaml
      - scripts/build_lifecycle_report.py
      - datasets/lifecycle_inventory.jsonl
      - reports/lifecycle_report.md
      - tests/test_lifecycle_metadata.py
    commands:
      - id: lifecycle_report
        name: 生成生命周期治理报告
        command: python3 scripts/build_lifecycle_report.py
      - id: lifecycle_tests
        name: 生命周期治理测试
        command: python3 -m pytest tests/test_lifecycle_metadata.py -v
    report_checks:
      - id: lifecycle_report_summary
        path: reports/lifecycle_report.md
        must_contain:
          - "# 生命周期治理报告"
          - "## 生命周期状态统计"
          - "## 元数据覆盖"
          - "## 质量规则结果"
          - "## 下一步行动"
      - id: pipeline_report
        path: reports/pipeline_report.md
        must_contain:
          - "总体状态：通过"
          - "构建生命周期治理报告"
      - id: quality_report
        path: reports/quality_report.md
        must_contain:
          - "JSON 错误数：0"
          - "Schema 错误数：0"
          - "制品清单未登记文件数：0"
    effect_review:
      one_line: 当前 KB 已从粗粒度复核状态升级为可解释、可统计、可验收的实体生命周期治理视图。
      new_capabilities:
        - 建立了 draft、candidate、reviewed、approved、deprecated、archived 六态生命周期模型。
        - 建立了机器可读生命周期策略，统一登记状态、元数据字段、推导规则和质量规则。
        - 建立了实体级生命周期清单，可按实体追踪状态、证据、复核包、行动项和有效期。
        - 将生命周期治理报告纳入确定性流水线，后续质量治理和服务化出口可直接引用该视图。
      user_can_now:
        - 快速区分哪些实体可被下游服务依赖，哪些仍只是候选或待补证据。
        - 查看每个实体为什么被判定为某个生命周期状态，而不只看到 pending 或 approved。
        - 用报告定位需要人工复核、补充证据或未来降级归档的实体。
      downstream_dependencies:
        - 阶段三语义质量治理可以基于 lifecycle_status 选择 active 实体和待治理实体。
        - RAG 或向量索引阶段可以默认只纳入 approved 实体，并保留 candidate 的人工复核边界。
        - JSON-LD、RDF 或 CSV 出口可以复用生命周期元数据表达数据有效性和发布范围。
    human_review_policy:
      allow_needs_human: true
      non_blocking_items:
        - pending 案例和 PaperMethod 仍需人工或语义流程推进，生命周期报告只负责显式暴露。
        - deprecated 与 archived 当前采用策略显式覆盖，尚未做自动失效判定。
        - valid_from 与 valid_until 仍需后续来源时效策略补齐。
  - id: phase_3_semantic_quality_v1
    name: 语义质量治理 v1
    acceptance_mode: deterministic_with_effect_review
    required_files:
      - docs/governance/semantic_quality_v1.md
      - config/semantic_quality_rules.yaml
      - scripts/build_semantic_quality_report.py
      - datasets/semantic_quality_findings.jsonl
      - reports/semantic_quality_report.md
      - tests/test_semantic_quality.py
    commands:
      - id: semantic_quality_report
        name: 生成语义质量治理报告
        command: python3 scripts/build_semantic_quality_report.py
      - id: semantic_quality_tests
        name: 语义质量治理测试
        command: python3 -m pytest tests/test_semantic_quality.py -v
    report_checks:
      - id: semantic_quality_report_summary
        path: reports/semantic_quality_report.md
        must_contain:
          - "# 语义质量治理报告"
          - "## 语义问题总览"
          - "## 等级统计"
          - "## RAG 默认可信集合影响"
          - "## 人工复核建议"
          - "## 后续 RAG 可依赖集合"
      - id: pipeline_report
        path: reports/pipeline_report.md
        must_contain:
          - "总体状态：通过"
          - "构建语义质量治理报告"
      - id: quality_report
        path: reports/quality_report.md
        must_contain:
          - "JSON 错误数：0"
          - "Schema 错误数：0"
          - "制品清单未登记文件数：0"
    effect_review:
      one_line: 当前 KB 已从结构质量可检查升级为语义问题可分级扫描、可解释验收的治理视图。
      new_capabilities:
        - 建立了 blocker、warning、info 三级语义质量 findings。
        - 建立了跨实体语义规则，覆盖异常证据模板、证据字段映射、关系类型约束、案例映射和数据源字段链路。
        - 建立了 RAG 默认可信集合影响视图，可区分 approved 可用实体和 candidate 排除实体。
        - 将语义质量报告纳入确定性流水线和阶段验收 Agent。
      user_can_now:
        - 查看当前 KB 有多少 blocker、warning、info 级语义问题。
        - 定位哪些实体或关系会影响后续 RAG 默认可信召回。
        - 将 findings 的 suggested_action 转成后续人工复核或规则补充任务。
      downstream_dependencies:
        - RAG 阶段可以默认使用 lifecycle_status=approved 且无 blocker 的实体集合。
        - JSON-LD/RDF 出口阶段可以引用语义 findings 判断哪些关系和实体适合公开导出。
        - 后续知识扩展阶段可以把新增实体先过语义质量门禁再纳入默认集合。
    human_review_policy:
      allow_needs_human: true
      non_blocking_items:
        - warning findings 需要人工判断是否补字段、补关系或登记例外。
        - candidate 实体仍需人工复核后才能进入 approved 默认可信集合。
        - EvidenceTemplate 到 DataField 的弱语义映射仍是确定性启发式，不替代专家判断。
  - id: phase_3_5_semantic_identity_v1
    name: 语义标识前置 v1
    acceptance_mode: deterministic_with_effect_review
    required_files:
      - docs/governance/semantic_identity_v1.md
      - docs/stages/phase_3_5_semantic_identity_v1.md
      - config/semantic_identity.yaml
      - scripts/build_semantic_identity.py
      - published/jsonld_context.json
      - published/semantic_id_map.jsonl
      - reports/semantic_identity_report.md
      - tests/test_semantic_identity.py
    commands:
      - id: semantic_identity_report
        name: 生成语义标识前置报告
        command: python3 scripts/build_semantic_identity.py
      - id: semantic_identity_tests
        name: 语义标识前置测试
        command: python3 -m pytest tests/test_semantic_identity.py -v
    report_checks:
      - id: semantic_identity_report_summary
        path: reports/semantic_identity_report.md
        must_contain:
          - "# 语义标识前置报告"
          - "## 命名空间与 URI 规则"
          - "## JSON-LD Context"
          - "## 稳定 ID 映射"
          - "## 字段映射草案"
          - "## 下游使用边界"
      - id: pipeline_report
        path: reports/pipeline_report.md
        must_contain:
          - "总体状态：通过"
          - "构建语义标识前置层"
      - id: quality_report
        path: reports/quality_report.md
        must_contain:
          - "JSON 错误数：0"
          - "Schema 错误数：0"
          - "制品清单未登记文件数：0"
    effect_review:
      one_line: 当前 KB 已在 RAG 和标准化出口前建立稳定语义标识层，后续接口可引用统一 @id。
      new_capabilities:
        - 建立了 bgpkb 命名空间、词表 URI 和资源 URI 基础规则。
        - 建立了 JSON-LD @context，覆盖 bgpkb、SKOS、PROV-O、schema.org 和核心字段。
        - 建立了实体、来源、chunk、关系和证据的稳定 URI 映射。
        - 将语义标识生成纳入确定性流水线、制品清单和阶段验收。
      user_can_now:
        - 查询任意实体、source 或 chunk 的稳定 URI。
        - 在 RAG context pack 中引用 @id，而不是临时字段名。
        - 查看现有字段到 JSON-LD、SKOS、PROV-O 的初步映射。
      downstream_dependencies:
        - 阶段四 RAG PoC 可以直接复用 semantic_id_map 绑定检索结果 @id。
        - 阶段五标准化出口可以在 jsonld_context 基础上扩展 JSON-LD 样例、SKOS 和 PROV-O。
        - 后续 RDF 导出可复用同一 URI 规则，避免再次重命名核心资源。
    human_review_policy:
      allow_needs_human: true
      non_blocking_items:
        - w3id 外部解析服务尚未配置，当前只承诺项目内稳定 URI。
        - 字段映射是轻量草案，完整 SKOS/PROV-O/RDF 语义仍留到阶段五扩展。
  - id: phase_4_rag_framework_v1
    name: RAG 就绪框架 v1
    acceptance_mode: deterministic_with_effect_review
    required_files:
      - docs/stages/phase_4_rag_framework_v1.md
      - config/rag_retrieval.yaml
      - config/llm_candidate_enrichment.yaml
      - schemas/retrieval_result.schema.json
      - schemas/context_pack.schema.json
      - scripts/build_llm_candidate_enrichment.py
      - scripts/build_rag_indexes.py
      - scripts/query_rag.py
      - scripts/build_rag_readiness_report.py
      - published/embedding_manifest.json
      - published/rag_mock_vector_index.jsonl
      - published/rag_retrieval_index.json
      - datasets/chunk_enrichment_candidates.jsonl
      - datasets/entity_link_candidates.jsonl
      - datasets/rag_query_eval.jsonl
      - reports/rag_readiness_report.md
      - tests/test_rag_framework_config.py
      - tests/test_llm_candidate_enrichment.py
      - tests/test_rag_indexes.py
      - tests/test_rag_retrieval.py
    commands:
      - id: llm_candidate_framework
        name: 生成 LLM 候选增强框架输出
        command: python3 scripts/build_llm_candidate_enrichment.py
      - id: rag_index_framework
        name: 生成 RAG 检索索引框架
        command: python3 scripts/build_rag_indexes.py
      - id: rag_framework_report
        name: 生成 RAG 就绪框架报告
        command: python3 scripts/build_rag_readiness_report.py
      - id: rag_framework_tests
        name: RAG 框架测试
        command: python3 -m pytest tests/test_rag_framework_config.py tests/test_llm_candidate_enrichment.py tests/test_rag_indexes.py tests/test_rag_retrieval.py tests/test_rag_readiness_report.py -v
      - id: rag_service_tests
        name: RAG 服务接口测试
        command: python3 -m pytest tests/test_service_api.py::test_retrieval_api_returns_traceable_search_evidence_and_context_pack -v
    report_checks:
      - id: rag_readiness_report_summary
        path: reports/rag_readiness_report.md
        must_contain:
          - "# RAG 就绪框架报告"
          - "当前设备不运行模型"
          - "## Provider 与运行边界"
          - "## RAG 索引覆盖"
          - "## 查询验收"
          - "## API 入口"
      - id: pipeline_report
        path: reports/pipeline_report.md
        must_contain:
          - "总体状态：通过"
          - "构建 RAG 就绪框架报告"
      - id: quality_report
        path: reports/quality_report.md
        must_contain:
          - "JSON 错误数：0"
          - "Schema 错误数：0"
          - "制品清单未登记文件数：0"
    effect_review:
      one_line: 当前 KB 已具备不运行模型也可验收的 RAG 框架，真实 DeepSeek、Qwen/vLLM、BGE-M3 和 Milvus 路径保留为显式启用项。
      new_capabilities:
        - 建立了 RAG provider 配置与运行边界，默认离线 mock，真实 provider 默认禁用。
        - 建立了 LLM 候选增强、mock embedding、检索索引、context pack 和 CLI/API 入口。
        - 建立了 route leak 和中文路由泄露等查询验收记录。
        - 将 RAG 框架纳入确定性流水线、数据管理和阶段验收。
      user_can_now:
        - 在当前设备不下载模型、不调用 API 的前提下运行 RAG 框架测试。
        - 通过 retrieval API 获取可追溯 search、evidence 和 context pack。
        - 后续在模型设备上用配置显式启用 DeepSeek、Qwen/vLLM、BGE-M3 或 Milvus。
      downstream_dependencies:
        - 阶段四真实模型评估可以复用同一 provider 与 context pack 契约。
        - 阶段五标准出口可以复用 RAG 返回的稳定 @id 和 citation 结构。
        - 后续问答系统可以基于 context pack 接入答案生成，但阶段四不直接生成答案。
    human_review_policy:
      allow_needs_human: true
      non_blocking_items:
        - 当前阶段只验收框架，不验收 BGE-M3/Milvus/DeepSeek 的真实召回效果。
        - LLM 候选仍需人工复核后才能进入主实体或关系。
  - id: phase_4_3_rag_answer_eval_v1
    name: RAG 答案质量评测 v1
    acceptance_mode: deterministic_with_effect_review
    required_files:
      - docs/stages/phase_4_3_rag_answer_eval_v1.md
      - datasets/rag_answer_eval_questions.jsonl
      - datasets/rag_answer_eval_results.jsonl
      - reports/rag_answer_eval_report.md
      - scripts/run_rag_answer_eval.py
      - tests/test_rag_answer_eval_dataset.py
      - tests/test_rag_answer_eval_script.py
      - tests/test_rag_retrieval_ranking.py
    commands:
      - id: rag_answer_eval
        name: 运行 RAG 答案质量评测
        command: python3 scripts/run_rag_answer_eval.py
      - id: rag_answer_eval_tests
        name: RAG 答案质量评测测试
        command: python3 -m pytest tests/test_rag_answer_eval_dataset.py tests/test_rag_answer_eval_script.py tests/test_rag_retrieval_ranking.py -v
    report_checks:
      - id: rag_answer_eval_report_summary
        path: reports/rag_answer_eval_report.md
        must_contain:
          - "# 阶段 4.3 RAG 答案评测报告"
          - "引用覆盖率：100.00%"
          - "无证据拒答率：100.00%"
          - "citations 全部来自 context_pack：是"
          - "## 逐题结果"
          - "## 需人工复核"
      - id: pipeline_report
        path: reports/pipeline_report.md
        must_contain:
          - "总体状态：通过"
          - "运行 RAG 答案质量评测"
      - id: quality_report
        path: reports/quality_report.md
        must_contain:
          - "JSON 错误数：0"
          - "Schema 错误数：0"
          - "制品清单未登记文件数：0"
    effect_review:
      one_line: 当前 KB 已具备可复跑的 RAG 答案质量、引用质量和拒答行为评测体系。
      new_capabilities:
        - 建立了 20 条固定 RAG 答案评测问题，覆盖概念、异常、数据源、中英文查询和无证据查询。
        - 建立了答案质量评测脚本，可检查状态、引用、禁用说法、must-have 术语和运行边界。
        - 建立了答案评测报告，输出引用覆盖率、无证据拒答率、逐题结论和人工复核项。
        - 为检索排序加入轻量意图权重，使定义、事件和方法类查询更稳定命中对应来源。
      user_can_now:
        - 一条命令复跑 RAG 答案质量评测并查看中文报告。
        - 在没有 API key 时做离线结构检查，在有 API key 时做真实答案评测。
        - 通过失败检查定位检索、引用或生成边界的问题。
      downstream_dependencies:
        - 阶段五可引用评测报告判断 RAG 输出是否适合进入标准化出口样例。
        - 后续 BGE-M3/Milvus 接入可复用同一评测集比较召回质量。
        - 后续答案生成策略可复用 must-have、forbidden 和 citation 检查作为回归门禁。
    human_review_policy:
      allow_needs_human: true
      non_blocking_items:
        - 当前离线结构检查不替代真实 DeepSeek 内容质量评审。
        - expected_source_refs 只作为召回观察信号，暂不作为阻塞性失败条件。
  - id: phase_4_4_deepseek_eval_analysis_v1
    name: DeepSeek 批量评测与失败分析 v1
    acceptance_mode: deterministic_with_effect_review
    required_files:
      - docs/stages/phase_4_4_deepseek_eval_analysis_v1.md
      - scripts/run_deepseek_rag_answer_eval.py
      - scripts/build_rag_answer_failure_analysis.py
      - datasets/deepseek_rag_answer_eval_results.jsonl
      - reports/deepseek_rag_answer_eval_report.md
      - reports/rag_answer_failure_analysis_report.md
      - tests/test_deepseek_eval_analysis.py
    commands:
      - id: rag_answer_failure_analysis
        name: 构建 RAG 答案失败样本分析
        command: python3 scripts/build_rag_answer_failure_analysis.py
      - id: deepseek_eval_analysis_tests
        name: DeepSeek 批量评测与失败分析测试
        command: python3 -m pytest tests/test_deepseek_eval_analysis.py -v
    report_checks:
      - id: deepseek_eval_report_summary
        path: reports/deepseek_rag_answer_eval_report.md
        must_contain:
          - "# 阶段 4.4 DeepSeek 真实批量评测报告"
          - "密钥记录：未写入报告、数据集或仓库。"
          - "引用覆盖率"
          - "无证据拒答率"
      - id: failure_analysis_report_summary
        path: reports/rag_answer_failure_analysis_report.md
        must_contain:
          - "# 阶段 4.4 RAG 答案失败样本分析报告"
          - "## 失败检查分布"
          - "## 失败样本"
          - "密钥记录：未读取、未写入、未报告。"
      - id: pipeline_report
        path: reports/pipeline_report.md
        must_contain:
          - "总体状态：通过"
          - "构建 RAG 答案失败样本分析"
      - id: quality_report
        path: reports/quality_report.md
        must_contain:
          - "JSON 错误数：0"
          - "Schema 错误数：0"
          - "制品清单未登记文件数：0"
    effect_review:
      one_line: 当前 KB 已具备真实 DeepSeek 批量评测记录，并能离线分析失败样本。
      new_capabilities:
        - 建立了真实 DeepSeek 批量评测脚本，复用阶段 4.3 固定评测集。
        - 建立了独立真实评测产物，避免被离线结构评测覆盖。
        - 建立了失败样本分析报告，可按失败检查和状态迁移聚合问题。
      user_can_now:
        - 使用环境变量运行真实 DeepSeek 批量评测。
        - 在没有 API key 的环境中复跑失败样本分析。
        - 快速定位真实模型回答里的引用、拒答或术语约束问题。
      downstream_dependencies:
        - 后续提示词优化可以直接基于失败检查分布调整。
        - 后续 BGE-M3/Milvus 召回评估可以复用同一真实评测结果格式。
        - 阶段五可选择通过样本作为标准化出口示例。
    human_review_policy:
      allow_needs_human: true
      non_blocking_items:
        - 真实 DeepSeek 输出仍需人工抽样判断语义准确性。
        - 当前失败分析基于自动检查项，不替代专家评审。
  - id: phase_4_5_bge_m3_hybrid_retrieval_v1
    name: BGE-M3 混合检索 v1
    acceptance_mode: deterministic_with_effect_review
    required_files:
      - docs/stages/phase_4_5_bge_m3_hybrid_retrieval_v1.md
      - config/rag_retrieval.yaml
      - service/bge_m3_remote_client.py
      - service/hybrid_retrieval.py
      - scripts/build_bge_m3_index.py
      - scripts/query_hybrid_rag.py
      - scripts/run_hybrid_retrieval_eval.py
      - published/bge_m3_embedding_manifest.json
      - datasets/hybrid_retrieval_eval_questions.jsonl
      - datasets/hybrid_retrieval_eval_results.jsonl
      - reports/bge_m3_embedding_report.md
      - reports/hybrid_retrieval_eval_report.md
      - tests/test_bge_m3_remote_client.py
      - tests/test_build_bge_m3_index.py
      - tests/test_hybrid_retrieval.py
      - tests/test_hybrid_retrieval_eval.py
    commands:
      - id: bge_m3_embedding_build
        name: 构建或结构化跳过 BGE-M3 远程向量索引
        command: python3 scripts/build_bge_m3_index.py
      - id: hybrid_retrieval_eval
        name: 运行混合检索评测
        command: python3 scripts/run_hybrid_retrieval_eval.py
      - id: hybrid_retrieval_tests
        name: 运行 BGE-M3 与混合检索测试
        command: python3 -m pytest tests/test_embedding_provider.py tests/test_bge_m3_remote_client.py tests/test_build_bge_m3_index.py tests/test_hybrid_retrieval.py tests/test_hybrid_retrieval_eval.py tests/test_service_api.py -v
    report_checks:
      - id: bge_m3_embedding_report_summary
        path: reports/bge_m3_embedding_report.md
        must_contain:
          - "# BGE-M3 Embedding 构建报告"
          - "当前设备未运行本地模型"
          - "未修改实体、关系、chunk、术语表或复核状态"
          - "## 输入数据"
      - id: hybrid_retrieval_eval_summary
        path: reports/hybrid_retrieval_eval_report.md
        must_contain:
          - "# 阶段 4.5 混合检索评测报告"
          - "通过数：20"
          - "失败数：0"
          - "无证据拒答率：100.00%"
          - "## 逐题结果"
      - id: pipeline_report
        path: reports/pipeline_report.md
        must_contain:
          - "总体状态：通过"
          - "构建 BGE-M3 远程向量索引"
          - "运行混合检索评测"
      - id: quality_report
        path: reports/quality_report.md
        must_contain:
          - "JSON 错误数：0"
          - "Schema 错误数：0"
          - "制品清单未登记文件数：0"
    effect_review:
      one_line: 当前 KB 已具备可替换远程 BGE-M3 provider、可解释融合排序、可信来源边界和固定检索评测体系。
      new_capabilities:
        - 建立了 SiliconFlow 优先、阿里云 PAI/EAS 兼容的远程 BGE-M3 客户端。
        - 建立了 chunk、entity、glossary、evidence template 四类数据的 embedding 文档和 manifest。
        - 建立了关键词、向量、元数据意图和 RRF 的可解释混合检索。
        - 建立了 20 题检索评测，覆盖 Recall@5、Recall@8、MRR、来源类型和无证据拒答。
      user_can_now:
        - 无 API key 时离线验证完整框架和排序边界。
        - 配置 SiliconFlow key 后构建真实 BGE-M3 文件化向量索引。
        - 通过 CLI、API 和 RAG Answer 使用同一 hybrid context pack。
      downstream_dependencies:
        - 后续可在不改检索契约的情况下切换阿里云 PAI/EAS 或其它 OpenAI-compatible embedding 服务。
        - 数据规模扩大后可把文件化向量索引替换为 Milvus 或 Qdrant。
        - 阶段五可复用当前 source_ref、chunk_id、review_status 和排序解释做标准化出口。
    human_review_policy:
      allow_needs_human: true
      non_blocking_items:
        - 真实 BGE-M3 向量效果已完成固定评测，仍建议对业务查询做持续人工抽样。
        - pending chunk 只在已批准实体 evidence 或已确定性处理来源的可追溯边界内进入检索，不会被改写为 approved。
