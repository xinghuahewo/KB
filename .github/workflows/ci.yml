name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bgp_knowledge_base
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-service.txt

      - name: Run tests
        run: python -m pytest -v

      - name: Run pipeline
        run: python scripts/run_pipeline.py

      - name: Run stage acceptance
        run: python scripts/run_stage_acceptance.py --stage phase_4_rag_framework_v1

      - name: Run artifact and quality checks
        run: python scripts/build_artifact_manifest.py && python scripts/quality_check.py
