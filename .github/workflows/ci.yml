name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Enable Corepack
        run: corepack enable

      - name: Install OpenSpec
        run: npm install --global @fission-ai/openspec@1.5.0

      - name: Bootstrap locked dependencies
        run: make bootstrap

      - name: Check repository hygiene
        run: bash scripts/check-repository-hygiene

      - name: Check documentation links
        run: python3 scripts/check-doc-links

      - name: Check workflow paths
        run: python3 scripts/check-workflow-paths

      - name: Run no-artifact tests
        run: make test

      - name: Validate OpenSpec
        run: openspec validate --all --strict --no-interactive

      - name: Build backend and frontend
        run: make build
